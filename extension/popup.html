<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!-- <meta http-equiv="Cont ent-Type" content="text/html;charset=UTF-8"> -->
  <style>
    body { width: 250px; font-family: sans-serif; padding: 15px; background: #f9fafb; }
    h3 { margin-top: 0; color: #111827; }
    label { display: block; margin-bottom: 5px; font-size: 14px; color: #374151; }
    input { width: 100%; margin-bottom: 15px; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; color: #059669; text-align: center; min-height: 15px; }
  </style>
</head>
<body>
  <h3>Impulse Guard</h3>
  <label>Your Hourly Rate (₹):</label>
  <input type="number" id="hourlyRate" value="500" min="1" />
  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
